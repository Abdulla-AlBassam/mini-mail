# Local DNS for the mail.local domain on the dissertation testbed.
# Resolves the synthetic mail.local domain inside the docker network so
# Postfix, Roundcube, and the spamfilter container can find each other
# by name without any host-side /etc/hosts edits.

# Don't try to forward bare/local queries to upstream resolvers.
# These two are dnsmasq's standard hardening pair: domain-needed drops
# any A query without a dot, bogus-priv stops reverse lookups for RFC1918
# addresses leaking out of this network.
domain-needed
bogus-priv

# Treat anything ending in .local as our authoritative zone
local=/local/
domain=local

# A records: every mailserver alias points at the mailserver container.
# spamfilter resolves to the milter container so the Postfix
# smtpd_milters config can name it directly.
host-record=mail.local,172.20.0.10
host-record=mailserver,172.20.0.10
host-record=mailserver.docker.local,172.20.0.10
host-record=spamfilter,172.20.0.30

# MX: mail.local is handled by the mailserver host
mx-host=mail.local,mailserver.docker.local,10

# SPF: only the mailserver IP is authorised to send for mail.local
txt-record=mail.local,"v=spf1 a mx ip4:172.20.0.10 -all"

# DKIM: public key for verifying signatures the mailserver puts on
# outbound mail. Private half lives in
# docker/mailserver/config/opendkim/keys/mail.local/mail.private and is
# generated by docker-mailserver on first run.
txt-record=mail._domainkey.mail.local,"v=DKIM1; h=sha256; k=rsa; "

# DMARC: strict policy. p=reject because in this isolated testbed there
# is no inbound mail from anywhere outside the docker network, so any
# message failing alignment is by definition spoofed.
txt-record=_dmarc.mail.local,"v=DMARC1; p=reject; rua=mailto:postmaster@mail.local; ruf=mailto:postmaster@mail.local; sp=reject; adkim=s; aspf=s;"

# Log every query to stderr so docker compose logs dns shows lookups
# during debugging.
log-queries
log-facility=-
